<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .banner {
    width: 1080px;
    height: 1080px;
    background: #0A0A14;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Ambient glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: #00FF88;
    top: -200px; left: -100px;
  }
  .orb-2 {
    width: 450px; height: 450px;
    background: #00E5FF;
    bottom: -200px; right: -100px;
  }
  .orb-3 {
    width: 400px; height: 400px;
    background: #5B8CFF;
    top: 200px; right: -150px;
  }
  .orb-4 {
    width: 350px; height: 350px;
    background: #B388FF;
    bottom: 100px; left: -100px;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .app-icon {
    width: 160px;
    height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.2));
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 96px;
    letter-spacing: 10px;
    background: linear-gradient(135deg, #00FF88, #00E5FF, #5B8CFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(0, 229, 255, 0.3));
  }

  .divider {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.5), transparent);
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 32px;
    color: #FAFAFA;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.4;
  }

  .sub-tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: rgba(250, 250, 250, 0.45);
    letter-spacing: 1px;
    text-align: center;
  }

  .handle {
    position: absolute;
    bottom: 40px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: rgba(0, 229, 255, 0.5);
    letter-spacing: 2px;
  }

  .full-logo {
    position: absolute;
    bottom: 70px;
    opacity: 0;
  }

  /* Corner accent marks */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: rgba(0, 229, 255, 0.15);
    border-style: solid;
    border-width: 0;
  }
  .corner-tl { top: 40px; left: 40px; border-top-width: 2px; border-left-width: 2px; }
  .corner-tr { top: 40px; right: 40px; border-top-width: 2px; border-right-width: 2px; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; }
</style>
</head>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
