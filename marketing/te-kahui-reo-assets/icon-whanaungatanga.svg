<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Whanaungatanga: Interlocking koru — relationships, connection, whakapapa -->
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#3A7D6E"/>
    </linearGradient>
    <linearGradient id="wg2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#3A7D6E"/>
    </linearGradient>
  </defs>
  <!-- Three interlocking koru representing whānau connection -->
  <!-- Left koru -->
  <path d="M20,56 C20,56 20,40 20,34 C20,24 26,18 34,18 C40,18 42,22 42,28 C42,32 40,34 36,34 C33,34 32,32 32,30"
    fill="none" stroke="url(#wg1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Right koru -->
  <path d="M60,56 C60,56 60,40 60,34 C60,24 54,18 46,18 C40,18 38,22 38,28 C38,32 40,34 44,34 C47,34 48,32 48,30"
    fill="none" stroke="url(#wg2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Base connecting line (roots/whenua) -->
  <path d="M20,56 C20,64 30,70 40,70 C50,70 60,64 60,56"
    fill="none" stroke="#3A7D6E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Centre meeting point -->
  <circle cx="40" cy="28" r="3" fill="#3A7D6E" opacity="0.6"/>
  <!-- Small connection nodes -->
  <circle cx="20" cy="56" r="2.5" fill="#D4A843" opacity="0.5"/>
  <circle cx="60" cy="56" r="2.5" fill="#1A3A5C" opacity="0.5"/>
  <circle cx="40" cy="70" r="2.5" fill="#3A7D6E" opacity="0.5"/>
</svg>
