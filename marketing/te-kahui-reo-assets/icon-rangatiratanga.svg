<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Rangatiratanga: Mauao peak — leadership, standing tall -->
  <defs>
    <linearGradient id="rg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9E7A2A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <!-- Mountain silhouette -->
  <polygon points="40,12 8,62 72,62" fill="url(#rg)"/>
  <!-- Dawn rays -->
  <line x1="40" y1="8" x2="40" y2="2" stroke="#D4A843" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="28" y1="12" x2="22" y2="6" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="52" y1="12" x2="58" y2="6" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Base line -->
  <line x1="4" y1="62" x2="76" y2="62" stroke="#D4A843" stroke-width="2" opacity="0.4"/>
  <!-- Koru at centre -->
  <path d="M40,38 C40,32 46,30 46,36 C46,40 42,42 40,38" fill="none" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
