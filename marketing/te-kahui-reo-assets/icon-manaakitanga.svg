<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Manaakitanga: Open hands / aroha — care, hospitality, uplifting -->
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#3A7D6E"/>
    </linearGradient>
  </defs>
  <!-- Two hands cupping upward -->
  <path d="M12,50 C12,50 16,40 22,36 C28,32 32,34 34,38 C36,42 36,48 36,48"
    fill="none" stroke="url(#mg)" stroke-width="3" stroke-linecap="round"/>
  <path d="M68,50 C68,50 64,40 58,36 C52,32 48,34 46,38 C44,42 44,48 44,48"
    fill="none" stroke="url(#mg)" stroke-width="3" stroke-linecap="round"/>
  <!-- Connection arc at base -->
  <path d="M12,50 C12,60 28,68 40,68 C52,68 68,60 68,50"
    fill="none" stroke="url(#mg)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Rising element (person/warmth) -->
  <circle cx="40" cy="24" r="6" fill="none" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="40" y1="30" x2="40" y2="42" stroke="#D4A843" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Warmth dots -->
  <circle cx="32" cy="18" r="1.5" fill="#D4A843" opacity="0.4"/>
  <circle cx="48" cy="18" r="1.5" fill="#3A7D6E" opacity="0.4"/>
  <circle cx="40" cy="14" r="1.5" fill="#D4A843" opacity="0.3"/>
</svg>
