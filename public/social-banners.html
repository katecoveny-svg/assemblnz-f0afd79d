<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assembl — Social Media Banners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Syne:wght@400;700;800&family=Plus+Jakarta+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-kowhai: #D4A843;
      --color-kowhai-light: #F0D078;
      --color-pounamu: #3A7D6E;
      --color-pounamu-light: #5AADA0;
      --color-tangaroa: #1A3A5C;
      --color-tangaroa-light: #3A6A9C;
      --color-bg: #09090F;
      --color-surface: #0F0F1A;
      --color-surface-2: #16162A;
      --color-card: #0A0A13;
      --color-bone: #F5F0E8;
      --color-ma: #E8E4DD;
      --color-white: #FFFFFF;
      --color-border: rgba(255, 255, 255, 0.08);
      --color-border-strong: rgba(255, 255, 255, 0.15);
      --color-text-primary: #FFFFFF;
      --color-text-secondary: rgba(255, 255, 255, 0.65);
      --color-text-muted: rgba(255, 255, 255, 0.35);
      --font-heading: 'Lato', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-eyebrow: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Starfield atmosphere */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 8% 15%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 23% 42%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 37% 8%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 67%, rgba(255,255,255,0.28) 0%, transparent 100%),
        radial-gradient(2px 2px at 66% 28%, rgba(255,255,255,0.40) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 55%, rgba(255,255,255,0.32) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 12%, rgba(255,255,255,0.50) 0%, transparent 100%),
        radial-gradient(1px 1px at 14% 73%, rgba(255,255,255,0.30) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 88%, rgba(255,255,255,0.38) 0%, transparent 100%),
        radial-gradient(1px 1px at 83% 79%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 6% 55%, rgba(212,168,67,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 35%, rgba(58,125,110,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 31% 22%, rgba(255,255,255,0.20) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 91%, rgba(255,255,255,0.22) 0%, transparent 100%),
        radial-gradient(2px 2px at 58% 44%, rgba(255,255,255,0.18) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      animation: drift 25s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(8px) translateX(3px); }
    }

    /* Subtle cosmic nebula overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(58,125,110,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(212,168,67,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 64px 32px 96px;
    }

    /* ── Page Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 64px;
    }

    .page-eyebrow {
      font-family: var(--font-eyebrow);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--color-kowhai);
      margin-bottom: 16px;
      display: block;
    }

    .page-title {
      font-family: var(--font-heading);
      font-weight: 300;
      font-size: clamp(42px, 6vw, 72px);
      letter-spacing: 12px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #ffffff 35%, #D4A843 65%, #3A7D6E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 40px rgba(212,168,67,0.15));
    }

    .page-subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 15px;
      color: var(--color-text-secondary);
      letter-spacing: 0.5px;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 40px;
    }

    /* ── Download All Button ── */
    .btn-download-all {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(212,168,67,0.06);
      border: 1px solid rgba(212,168,67,0.5);
      color: var(--color-kowhai);
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 300ms var(--ease-standard);
      text-decoration: none;
    }

    .btn-download-all:hover {
      background: rgba(212,168,67,0.12);
      border-color: var(--color-kowhai);
      box-shadow: 0 0 24px rgba(212,168,67,0.2);
      transform: translateY(-1px);
    }

    .btn-download-all:active {
      transform: translateY(0px);
    }

    /* Divider */
    .page-divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,67,0.4), transparent);
      margin: 48px auto 0;
    }

    /* ── Banner Grid ── */
    .banners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 40px;
      align-items: start;
    }

    /* ── Banner Card ── */
    .banner-card {
      background: rgba(15, 15, 26, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      transition: all 350ms var(--ease-standard);
    }

    .banner-card:hover {
      border-color: rgba(212,168,67,0.2);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,168,67,0.06);
      transform: translateY(-2px);
    }

    .banner-preview {
      width: 100%;
      overflow: hidden;
      background: #09090F;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .banner-preview canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .banner-info {
      padding: 20px 24px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .banner-name {
      font-family: var(--font-eyebrow);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--color-kowhai);
      margin-bottom: 4px;
    }

    .banner-dimensions {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(10,10,19,0.8);
      border: 1px solid rgba(212,168,67,0.4);
      color: var(--color-kowhai);
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 250ms var(--ease-standard);
    }

    .btn-download:hover {
      background: rgba(212,168,67,0.1);
      border-color: var(--color-kowhai);
      box-shadow: 0 0 16px rgba(212,168,67,0.15);
    }

    .btn-download:active {
      transform: scale(0.97);
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      margin-top: 80px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-mark {
      font-family: var(--font-heading);
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .footer-mark span {
      color: rgba(212,168,67,0.5);
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- ── Page Header ── -->
  <header class="page-header">
    <span class="page-eyebrow">Social Media Banners</span>
    <h1 class="page-title">Assembl</h1>
    <p class="page-subtitle">Full-resolution brand banners for every platform. Rendered at native resolution — download as PNG.</p>
    <button class="btn-download-all" onclick="downloadAll()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Download All Banners
    </button>
    <div class="page-divider"></div>
  </header>

  <!-- ── Banner Grid ── -->
  <div class="banners-grid" id="bannersGrid"></div>

  <!-- ── Footer ── -->
  <footer class="page-footer">
    <p class="footer-mark">Assembl <span>·</span> Mārama Brand System <span>·</span> Tāmaki Makaurau</p>
  </footer>

</div>

<script>
// ──────────────────────────────────────────────
// Banner Configuration
// ──────────────────────────────────────────────

const BANNERS = [
  { id: 'banner-ig-feed',   name: 'Instagram Feed',   slug: 'instagram-feed',   w: 1080, h: 1080, tagline: true  },
  { id: 'banner-ig-story',  name: 'Instagram Story',  slug: 'instagram-story',  w: 1080, h: 1920, tagline: true  },
  { id: 'banner-linkedin',  name: 'LinkedIn Post',    slug: 'linkedin',         w: 1200, h: 628,  tagline: true  },
  { id: 'banner-twitter',   name: 'Twitter / X',      slug: 'twitter-x',        w: 1200, h: 675,  tagline: true  },
  { id: 'banner-fb-cover',  name: 'Facebook Cover',   slug: 'facebook-cover',   w: 1640, h: 624,  tagline: false },
];

// ──────────────────────────────────────────────
// Mauao Ridge — normalised coords
// ──────────────────────────────────────────────

const RIDGE = [
  [0.00,  0.95],
  [0.10,  0.85],
  [0.20,  0.78],
  [0.30,  0.72],
  [0.38,  0.65],
  [0.42,  0.52],   // ← peak
  [0.48,  0.58],
  [0.55,  0.65],
  [0.65,  0.72],
  [0.75,  0.78],
  [0.88,  0.85],
  [1.00,  0.92],
];

const PEAK_X = 0.42;
const PEAK_Y = 0.52;

// ──────────────────────────────────────────────
// Core draw function
// ──────────────────────────────────────────────

function drawBanner(canvas, cfg) {
  const { w, h, tagline } = cfg;
  canvas.width  = w;
  canvas.height = h;

  const ctx = canvas.getContext('2d');

  // 1. Background gradient — deep space
  const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
  bgGrad.addColorStop(0,   '#09090F');
  bgGrad.addColorStop(0.6, '#0F0F1A');
  bgGrad.addColorStop(1,   '#0A0A12');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // 2. Subtle nebula orbs
  const nebula1 = ctx.createRadialGradient(w * 0.75, h * 0.25, 0, w * 0.75, h * 0.25, w * 0.4);
  nebula1.addColorStop(0,   'rgba(58,125,110,0.06)');
  nebula1.addColorStop(1,   'transparent');
  ctx.fillStyle = nebula1;
  ctx.fillRect(0, 0, w, h);

  const nebula2 = ctx.createRadialGradient(w * 0.2, h * 0.6, 0, w * 0.2, h * 0.6, w * 0.35);
  nebula2.addColorStop(0,   'rgba(212,168,67,0.05)');
  nebula2.addColorStop(1,   'transparent');
  ctx.fillStyle = nebula2;
  ctx.fillRect(0, 0, w, h);

  // 3. Starfield
  drawStars(ctx, w, h);

  // 4. Mauao mountain
  drawMauao(ctx, w, h);

  // 5. Constellation mark
  const logoScale = Math.min(w, h) / 1080;
  drawConstellation(ctx, w, h, logoScale);

  // 6. Wordmark
  drawWordmark(ctx, w, h, logoScale, tagline);
}

// ──────────────────────────────────────────────
// Stars
// ──────────────────────────────────────────────

function drawStars(ctx, w, h) {
  // Seed-based pseudo-random for consistent look
  const rand = seededRand(42);

  // Small dim stars
  for (let i = 0; i < 180; i++) {
    const x = rand() * w;
    const y = rand() * h * 0.85; // stars above mountain
    const r = rand() * 0.8 + 0.3;
    const a = rand() * 0.45 + 0.1;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  }

  // Medium brighter stars
  for (let i = 0; i < 30; i++) {
    const x = rand() * w;
    const y = rand() * h * 0.75;
    const r = rand() * 1.2 + 0.8;
    const a = rand() * 0.5 + 0.3;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();

    // Tiny glow on bright stars
    const glow = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
    glow.addColorStop(0,   `rgba(255,255,255,${a * 0.3})`);
    glow.addColorStop(1,   'transparent');
    ctx.beginPath();
    ctx.arc(x, y, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // A handful of slightly gold-tinted stars near peak area
  for (let i = 0; i < 8; i++) {
    const x = rand() * w * 0.3 + w * 0.28;
    const y = rand() * h * 0.3 + h * 0.05;
    const r = rand() * 0.7 + 0.4;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212,168,67,${rand() * 0.3 + 0.15})`;
    ctx.fill();
  }
}

function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// ──────────────────────────────────────────────
// Mauao
// ──────────────────────────────────────────────

function drawMauao(ctx, w, h) {
  const pts = RIDGE.map(([nx, ny]) => [nx * w, ny * h]);
  const peakX = PEAK_X * w;
  const peakY = PEAK_Y * h;

  // ─ Peak atmospheric glow (behind everything)
  const peakGlow = ctx.createRadialGradient(peakX, peakY, 0, peakX, peakY, h * 0.22);
  peakGlow.addColorStop(0,   'rgba(212,168,67,0.18)');
  peakGlow.addColorStop(0.3, 'rgba(58,125,110,0.10)');
  peakGlow.addColorStop(0.7, 'rgba(58,125,110,0.04)');
  peakGlow.addColorStop(1,   'transparent');
  ctx.fillStyle = peakGlow;
  ctx.fillRect(0, 0, w, h);

  // ─ Mountain body fill (below ridge)
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i][0], pts[i][1]);
  }
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();

  const bodyGrad = ctx.createLinearGradient(0, peakY, 0, h);
  bodyGrad.addColorStop(0,   'rgba(8,18,14,0.92)');
  bodyGrad.addColorStop(0.4, 'rgba(6,14,10,0.97)');
  bodyGrad.addColorStop(1,   'rgba(3,8,5,1)');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // ─ Inner mountain highlight (subtle teal sheen on slopes)
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i][0], pts[i][1]);
  }
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();

  const sheenGrad = ctx.createLinearGradient(peakX - w * 0.15, peakY, peakX + w * 0.15, peakY + h * 0.15);
  sheenGrad.addColorStop(0,   'rgba(58,125,110,0.08)');
  sheenGrad.addColorStop(1,   'transparent');
  ctx.fillStyle = sheenGrad;
  ctx.fill();

  // ─ Ridge line stroke (gold at peak → pounamu at foothills)
  const ridgeGrad = ctx.createLinearGradient(0, pts[0][1], w, pts[pts.length - 1][1]);
  ridgeGrad.addColorStop(0,    'rgba(58,125,110,0.55)');
  ridgeGrad.addColorStop(0.35, 'rgba(90,173,160,0.70)');
  ridgeGrad.addColorStop(0.42, 'rgba(212,168,67,1.0)');    // peak
  ridgeGrad.addColorStop(0.50, 'rgba(240,208,120,0.85)');  // just past peak
  ridgeGrad.addColorStop(0.65, 'rgba(90,173,160,0.65)');
  ridgeGrad.addColorStop(1,    'rgba(58,125,110,0.45)');

  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i][0], pts[i][1]);
  }
  ctx.strokeStyle = ridgeGrad;
  ctx.lineWidth   = Math.max(1.5, w / 500);
  ctx.lineJoin    = 'round';
  ctx.stroke();

  // ─ Ridge glow (second wider soft stroke)
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i][0], pts[i][1]);
  }
  ctx.strokeStyle = 'rgba(212,168,67,0.15)';
  ctx.lineWidth   = Math.max(6, w / 100);
  ctx.lineJoin    = 'round';
  ctx.stroke();

  // ─ Peak corona — tight bright glow at the summit
  const coronaOuter = ctx.createRadialGradient(peakX, peakY, 0, peakX, peakY, h * 0.06);
  coronaOuter.addColorStop(0,   'rgba(212,168,67,0.35)');
  coronaOuter.addColorStop(0.4, 'rgba(212,168,67,0.12)');
  coronaOuter.addColorStop(1,   'transparent');
  ctx.fillStyle = coronaOuter;
  ctx.fillRect(0, 0, w, h);
}

// ──────────────────────────────────────────────
// Constellation mark
// ──────────────────────────────────────────────

function drawConstellation(ctx, w, h, scale) {
  // Position the mark:
  //   - For square/portrait: centred horizontally, upper-mid vertically
  //   - For landscape: slightly left of centre, upper third
  const isLandscape = w > h * 1.1;

  const baseRadius = 18 * scale;
  const triSize    = 70 * scale;

  let cx, cy;
  if (isLandscape) {
    cx = w * 0.42;
    cy = h * 0.36;
  } else {
    cx = w * 0.50;
    cy = h * 0.30;
  }

  // Triangle node positions
  // Top node (gold), bottom-left (pounamu), bottom-right (pounamu-light)
  const topNode   = { x: cx,               y: cy - triSize,        color: '#D4A843', glow: 'rgba(212,168,67,0.9)' };
  const leftNode  = { x: cx - triSize * 0.82, y: cy + triSize * 0.5, color: '#3A7D6E', glow: 'rgba(58,125,110,0.7)' };
  const rightNode = { x: cx + triSize * 0.82, y: cy + triSize * 0.5, color: '#5AADA0', glow: 'rgba(90,173,160,0.7)' };

  const nodes = [topNode, leftNode, rightNode];

  // ─ Connection lines
  ctx.save();
  ctx.globalAlpha = 0.60;
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth   = Math.max(1, 1.2 * scale);
  ctx.lineCap     = 'round';

  const pairs = [[topNode, leftNode], [topNode, rightNode], [leftNode, rightNode]];
  pairs.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  });
  ctx.restore();

  // ─ Draw each node
  nodes.forEach(node => {
    const r = baseRadius;

    // Outer glow
    const outerGlow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r * 3.5);
    outerGlow.addColorStop(0,   node.glow.replace('0.', '0.2').replace('0.9)', '0.22)').replace('0.7)', '0.18)'));
    outerGlow.addColorStop(1,   'transparent');
    ctx.beginPath();
    ctx.arc(node.x, node.y, r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = outerGlow;
    ctx.fill();

    // Base sphere gradient (dark centre with colour at edge)
    const sphereGrad = ctx.createRadialGradient(
      node.x - r * 0.3, node.y - r * 0.3, r * 0.05,
      node.x, node.y, r
    );
    sphereGrad.addColorStop(0,   hexToRgba(node.color, 0.85));
    sphereGrad.addColorStop(0.5, hexToRgba(node.color, 0.60));
    sphereGrad.addColorStop(1,   hexToRgba(node.color, 0.30));
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.fillStyle = sphereGrad;
    ctx.fill();

    // White highlight overlay (top half)
    const highlight = ctx.createRadialGradient(
      node.x - r * 0.25, node.y - r * 0.35, 0,
      node.x, node.y, r * 0.85
    );
    highlight.addColorStop(0,   'rgba(255,255,255,0.55)');
    highlight.addColorStop(0.4, 'rgba(255,255,255,0.12)');
    highlight.addColorStop(1,   'transparent');
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.fillStyle = highlight;
    ctx.fill();

    // Rim light (subtle)
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = hexToRgba(node.color, 0.5);
    ctx.lineWidth   = Math.max(1, scale);
    ctx.stroke();
  });
}

// ──────────────────────────────────────────────
// Wordmark
// ──────────────────────────────────────────────

function drawWordmark(ctx, w, h, scale, showTagline) {
  const isLandscape = w > h * 1.1;
  const isStory     = h > w * 1.5;

  // Font size tuned per aspect ratio
  let fontSize;
  if (isStory) {
    fontSize = Math.round(w * 0.13);
  } else if (isLandscape) {
    fontSize = Math.round(h * 0.14);
  } else {
    fontSize = Math.round(w * 0.115);
  }

  const letterSpacing = fontSize * 0.35;

  // Position wordmark below the constellation
  let wordY;
  if (isStory) {
    wordY = h * 0.56;
  } else if (isLandscape) {
    wordY = h * 0.68;
  } else {
    wordY = h * 0.56;
  }

  // ─ Wordmark gradient
  const wordmarkText = 'ASSEMBL';
  ctx.font = `300 ${fontSize}px 'Lato', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Measure to build gradient
  const metrics = ctx.measureText(wordmarkText);
  const textW   = metrics.width + letterSpacing * (wordmarkText.length - 1);

  const wordGrad = ctx.createLinearGradient(
    w / 2 - textW / 2, wordY,
    w / 2 + textW / 2, wordY
  );
  wordGrad.addColorStop(0,    '#FFFFFF');
  wordGrad.addColorStop(0.40, '#FFFFFF');
  wordGrad.addColorStop(0.65, '#D4A843');
  wordGrad.addColorStop(1,    '#5AADA0');

  // Glow behind text
  ctx.save();
  ctx.shadowColor   = 'rgba(212,168,67,0.35)';
  ctx.shadowBlur    = fontSize * 0.8;
  ctx.fillStyle     = wordGrad;

  // Draw with manual letter spacing
  drawTextWithSpacing(ctx, wordmarkText, w / 2, wordY, fontSize, letterSpacing, wordGrad);

  ctx.restore();

  // ─ Tagline
  if (showTagline) {
    const tagSize = Math.round(fontSize * 0.22);
    const tagY    = wordY + fontSize * 0.75;

    ctx.font        = `300 ${tagSize}px 'Lato', sans-serif`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = 'rgba(255,255,255,0.45)';
    ctx.letterSpacing = `${tagSize * 0.25}px`;

    drawTextWithSpacing(ctx, 'BUSINESS INTELLIGENCE · NZ', w / 2, tagY, tagSize, tagSize * 0.22, null, 'rgba(255,255,255,0.45)');
  }
}

function drawTextWithSpacing(ctx, text, cx, cy, fontSize, spacing, gradient, solidColor) {
  // Calculate total width for centering
  ctx.font = `300 ${fontSize}px 'Lato', sans-serif`;
  const charWidths = [];
  let totalW = 0;
  for (let i = 0; i < text.length; i++) {
    const cw = ctx.measureText(text[i]).width;
    charWidths.push(cw);
    totalW += cw;
    if (i < text.length - 1) totalW += spacing;
  }

  let startX = cx - totalW / 2;

  for (let i = 0; i < text.length; i++) {
    const charX = startX + charWidths[i] / 2;

    if (gradient) {
      // Recreate gradient for this character's position
      ctx.fillStyle = gradient;
    } else if (solidColor) {
      ctx.fillStyle = solidColor;
    }

    ctx.font          = `300 ${fontSize}px 'Lato', sans-serif`;
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillText(text[i], charX, cy);

    startX += charWidths[i] + spacing;
  }
}

// ──────────────────────────────────────────────
// Utility
// ──────────────────────────────────────────────

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getDateString() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

// ──────────────────────────────────────────────
// Download
// ──────────────────────────────────────────────

function downloadCanvas(canvas, slug) {
  const date = getDateString();
  const filename = `assembl-${slug}-${date}.png`;
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

function downloadAll() {
  const canvases = document.querySelectorAll('canvas[data-slug]');
  let delay = 0;
  canvases.forEach(canvas => {
    setTimeout(() => {
      downloadCanvas(canvas, canvas.dataset.slug);
    }, delay);
    delay += 400;
  });
}

// ──────────────────────────────────────────────
// Build page
// ──────────────────────────────────────────────

function buildPage() {
  const grid = document.getElementById('bannersGrid');

  BANNERS.forEach(cfg => {
    // Card
    const card = document.createElement('div');
    card.className = 'banner-card';

    // Preview wrapper
    const preview = document.createElement('div');
    preview.className = 'banner-preview';

    // Canvas — displayed at 100% width but native resolution
    const canvas = document.createElement('canvas');
    canvas.id          = cfg.id;
    canvas.dataset.slug = cfg.slug;
    // CSS handles the display scale (width: 100%)

    preview.appendChild(canvas);

    // Info panel
    const info = document.createElement('div');
    info.className = 'banner-info';
    info.innerHTML = `
      <div class="banner-name">${cfg.name}</div>
      <div class="banner-dimensions">${cfg.w} × ${cfg.h} px</div>
      <button class="btn-download" data-id="${cfg.id}" data-slug="${cfg.slug}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M6 1v7M3 5.5l3 3 3-3M1 10.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download PNG
      </button>
    `;

    card.appendChild(preview);
    card.appendChild(info);
    grid.appendChild(card);

    // Draw banner
    drawBanner(canvas, cfg);

    // Download button listener
    info.querySelector('.btn-download').addEventListener('click', () => {
      downloadCanvas(canvas, cfg.slug);
    });
  });
}

// Init on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', buildPage);
} else {
  buildPage();
}
</script>
