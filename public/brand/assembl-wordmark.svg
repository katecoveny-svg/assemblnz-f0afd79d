<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
<defs>
<linearGradient id="wordmark-grad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
<stop offset="50%" style="stop-color:#7ED4C5;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#3A7D6E;stop-opacity:1"/>
</linearGradient>
<filter id="wm-glow" x="-20%" y="-50%" width="140%" height="200%">
