</feMerge>
</filter>
</defs>
<text x="200" y="68" font-family="Lato, sans-serif" font-size="56" font-weight="300" text-anchor="middle" fill="url(#wordmark-grad)" letter-spacing="6" filter="url(#wm-glow)">assembl</text>
