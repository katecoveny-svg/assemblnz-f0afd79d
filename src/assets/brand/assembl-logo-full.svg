<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
<defs>
<radialGradient id="kowhai-grad" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#F5E6C8;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#D4A843;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#B8892A;stop-opacity:1"/>
</radialGradient>
<radialGradient id="pounamu-grad" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#6FA89A;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#3A7D6E;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#2B5C54;stop-opacity:1"/>
</radialGradient>
<radialGradient id="pounamu-light-grad" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#8BC4B8;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#5AADA0;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#3F8B81;stop-opacity:1"/>
</radialGradient>
<linearGradient id="wordmark-grad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
<stop offset="35%" style="stop-color:#D4A843;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#3A7D6E;stop-opacity:1"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>
<g id="mark">
<line x1="200" y1="35" x2="140" y2="95" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="200" y1="35" x2="260" y2="95" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="140" y1="95" x2="260" y2="95" stroke="white" stroke-width="1.5" opacity="0.25"/>
<circle cx="200" cy="35" r="14" fill="url(#kowhai-grad)" filter="url(#glow)"/>
<circle cx="200" cy="35" r="10.5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
<circle cx="140" cy="95" r="14" fill="url(#pounamu-grad)" filter="url(#glow)"/>
<circle cx="140" cy="95" r="10.5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
<circle cx="260" cy="95" r="14" fill="url(#pounamu-light-grad)" filter="url(#glow)"/>
<circle cx="260" cy="95" r="10.5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
</g>
<text x="200" y="210" font-family="Lato, sans-serif" font-size="44" font-weight="300" text-anchor="middle" fill="url(#wordmark-grad)" letter-spacing="5">assembl</text>
</svg>